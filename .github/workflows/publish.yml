name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  # Re-run the full test matrix on the tagged commit before we ship.
  # We don't blindly trust that whoever cut the release first checked CI on main.
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - run: pytest -q --ignore=tests/test_e2e_mcp.py

  e2e:
    name: E2E (${{ matrix.backend }} backend)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [bundled, onnx]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (bundled only)
        if: matrix.backend == 'bundled'
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
          pip uninstall -y onnxruntime tokenizers huggingface-hub numpy || true
      - name: Install (with ONNX)
        if: matrix.backend == 'onnx'
        run: |
          python -m pip install -U pip
          pip install -e ".[dev,onnx]"
      - name: Pre-cache MiniLM
        if: matrix.backend == 'onnx'
        run: |
          python -c "from huggingface_hub import hf_hub_download; \
                     hf_hub_download('sentence-transformers/all-MiniLM-L6-v2', 'onnx/model.onnx'); \
                     hf_hub_download('sentence-transformers/all-MiniLM-L6-v2', 'tokenizer.json')"
      - name: Run e2e
        env:
          YANTRIKDB_EMBEDDER: ${{ matrix.backend }}
        run: pytest -q tests/test_e2e_mcp.py

  publish:
    name: Build + upload to PyPI
    needs: [unit, e2e]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build
      - name: Build package
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
