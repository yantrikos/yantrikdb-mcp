name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps (with [onnx] for full coverage)
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Run unit tests (excluding e2e)
        run: pytest -q --ignore=tests/test_e2e_mcp.py

  e2e:
    name: E2E (${{ matrix.backend }} backend)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [bundled, onnx]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package (bundled only)
        if: matrix.backend == 'bundled'
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
          # Strip ONNX deps so we exercise the bundled-only install path
          pip uninstall -y onnxruntime tokenizers huggingface-hub numpy || true

      - name: Install package + ONNX extras
        if: matrix.backend == 'onnx'
        run: |
          python -m pip install -U pip
          pip install -e ".[dev,onnx]"

      - name: Pre-cache HuggingFace MiniLM (onnx only)
        if: matrix.backend == 'onnx'
        run: |
          python -c "from huggingface_hub import hf_hub_download; \
                     hf_hub_download('sentence-transformers/all-MiniLM-L6-v2', 'onnx/model.onnx'); \
                     hf_hub_download('sentence-transformers/all-MiniLM-L6-v2', 'tokenizer.json')"

      - name: Run e2e (${{ matrix.backend }})
        env:
          YANTRIKDB_EMBEDDER: ${{ matrix.backend }}
        run: pytest -q tests/test_e2e_mcp.py
