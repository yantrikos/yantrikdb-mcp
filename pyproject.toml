[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "yantrikdb-mcp"
version = "0.5.3"
description = "YantrikDB MCP Server — Cognitive memory for AI agents"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Pranab Sarkar", email = "developer@pranab.co.in" },
]
keywords = ["ai", "memory", "mcp", "cognitive", "agent", "claude", "cursor"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "yantrikdb>=0.3.0",
    "mcp[cli]>=1.2.0",
    "onnxruntime>=1.17.0",
    "tokenizers>=0.15.0",
    "huggingface-hub>=0.20.0",
    "numpy>=1.24.0",
    "click>=8.0.0",
    "requests>=2.28.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]
torch = ["sentence-transformers>=3.0.0"]

[project.scripts]
yantrikdb-mcp = "yantrikdb_mcp:main"

[project.urls]
Homepage = "https://yantrikdb.com"
Repository = "https://github.com/yantrikos/yantrikdb-mcp"
Documentation = "https://yantrikdb.com/guides/mcp/"
Issues = "https://github.com/yantrikos/yantrikdb-mcp/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
